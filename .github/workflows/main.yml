name: deploy to lambda
permissions:
  id-token: write
  contents: read
on:
  # Trigger the workflow on push or pull request,
  # but only for the main branch
  push:
    branches:
      - main
jobs:
  deploy_source:
    name: deploy lambda from source
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - name: Install poetry
        run: pipx install poetry
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          check-latest: true
          cache: 'poetry'
      - run: poetry install
      - name: package
        run: |
          poetry run pip install -t dist .
          cd dist
          mv boat_edit_to_github/lambda_function.py .
          zip -x 'boat_edit_to_github*' '*.pyc' -r ../lambda.zip . 
      - name: cred
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-region: eu-west-1
          role-to-assume: arn:aws:iam::651845762820:role/github-OIDC-Role-JdfwPtWdASUt
      - name: deploy
        run: |
          aws lambda update-function-code --function-name web-edit-boat-to-github --zip-file fileb://lambda.zip
          aws cloudformation update-stack --capabilities CAPABILITY_AUTO_EXPAND --stack-name web-edit-boat-to-github --template-body file://boat-edit-to-github.yaml
